[build]
  command   = "pnpm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION              = "20"
  NETLIFY_NEXT_PLUGIN_SKIP  = "true"
  NEXT_DISABLE_TURBOPACK    = "1"

# /quote/* — standalone form page designed to be iframe-embedded inside the
# JamBot voice-agent canvas. Drop X-Frame-Options DENY (Netlify's default for
# most frameworks) and pin a frame-ancestors CSP to JamBot tenants + self.
[[headers]]
  for = "/quote/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors 'self' https://*.jam-bot.com https://*.netlify.app"

[[headers]]
  for = "/quote"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors 'self' https://*.jam-bot.com https://*.netlify.app"
