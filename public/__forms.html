<!DOCTYPE html>
<html>
<head><title>Forms</title></head>
<body>
<form name="canadian-spray-foam-quote" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="canadian-spray-foam-quote" />
  <input name="bot-field" />
  <input type="text" name="businessName" required />
  <input type="text" name="firstName" required />
  <input type="text" name="lastName" required />
  <input type="email" name="email" required />
  <input type="tel" name="phone" required />
  <select name="province" required>
    <option value="ON">Ontario</option>
    <option value="QC">Quebec</option>
    <option value="BC">British Columbia</option>
    <option value="AB">Alberta</option>
    <option value="MB">Manitoba</option>
    <option value="NB">New Brunswick</option>
    <option value="NL">Newfoundland and Labrador</option>
    <option value="NS">Nova Scotia</option>
    <option value="PE">Prince Edward Island</option>
    <option value="SK">Saskatchewan</option>
    <option value="NT">Northwest Territories</option>
    <option value="NU">Nunavut</option>
    <option value="YT">Yukon</option>
  </select>
  <input type="text" name="postalCode" required />
  <select name="yearsInBusiness" required>
    <option value="lt1">Less than 1 year</option>
    <option value="1-3">1-3 years</option>
    <option value="3-10">3-10 years</option>
    <option value="10+">10+ years</option>
  </select>
  <select name="numberOfEmployees" required>
    <option value="1">1</option>
    <option value="2-5">2-5</option>
    <option value="6-10">6-10</option>
    <option value="11-25">11-25</option>
    <option value="26-50">26-50</option>
    <option value="50+">50+</option>
  </select>
  <select name="annualRevenue" required>
    <option value="lt250k">Under $250,000</option>
    <option value="250k-500k">$250,000 - $500,000</option>
    <option value="500k-1m">$500,000 - $1,000,000</option>
    <option value="1m-2m">$1,000,000 - $2,000,000</option>
    <option value="2m-5m">$2,000,000 - $5,000,000</option>
    <option value="5m+">$5,000,000+</option>
  </select>
  <input type="text" name="typeOfWork" />
  <input type="text" name="coverageNeeded" />
  <input type="text" name="currentCarrier" />
  <input type="date" name="renewalDate" />
  <textarea name="additionalNotes"></textarea>
  <input type="checkbox" name="pipedaConsent" required />
</form>
</body>
</html>
